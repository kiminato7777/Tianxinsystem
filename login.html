<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - School Management System</title>
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Icons -->
  <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/uicons-regular-rounded/css/uicons-regular-rounded.css'>
  <link rel="stylesheet" href="/css/loader.css">
  <script src="/js/core/loader-init.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="/css/login.css">
  <link rel="icon" type="image/jpeg" href="/img/1.jpg">

  <style>
    * {
      font-family: 'Kantumruy Pro', sans-serif;
    }
  </style>
</head>

<body>

  <div id="customAlert"></div>

  <!-- Account Blocked Modal -->
  <div id="blockedModal" class="modal-overlay">
    <div class="modal-card">
      <div class="modal-icon">
        <i class="fi fi-rr-ban"></i>
      </div>
      <h2 class="modal-title">គណនីត្រូវបានបិទ!</h2>
      <p class="modal-text">
        គណនីរបស់លោកអ្នកត្រូវបានបិទ សូមធ្វើការទាក់ទងជាមួយIT ដើម្បីបង្កើតគណនីសម្រាប់ប្រើប្រាស់ !!សូមអរគុណ
      </p>
      <div class="modal-info">
        <i class="fi fi-rr-info"></i> Contact: IT Support Team
      </div>
      <button onclick="closeBlockedModal()" class="modal-btn">យល់ព្រម (OK)</button>
    </div>
  </div>



  <!-- Animated Background Shapes -->
  <div class="background-shape shape-1"></div>
  <div class="background-shape shape-2"></div>
  <div class="background-shape shape-3"></div>

  <div class="login-card">
    <div class="login-header">
      <div class="logo-container" id="login-logo-container">
        <img src="/img/1.jpg" alt="Logo" class="logo-img" 
             onerror="document.getElementById('login-logo-container').style.display='none'">
      </div>
      <h2 style="font-family: 'Kantumruy Pro', serif; font-weight: 700; color: #d63384; font-size: 24px;">
        សាលាអន្តរជាតិ ធាន ស៊ីន</h2>
      <p style="font-size: 16px; margin-top: 5px; color: #666;">ប្រព័ន្ធគ្រប់គ្រងសាលារៀន (School Management)</p>
    </div>

    <form id="loginForm">
      <div class="input-group">
        <i class="fi fi-rr-envelope input-icon"></i>
        <input type="text" id="username" placeholder="អ៊ីមែល (Email)" required>
      </div>

      <div class="input-group">
        <i class="fi fi-rr-lock input-icon"></i>
        <input type="password" id="password" placeholder="ពាក្យសម្ងាត់ (Password)" required>
        <i class="fi fi-rr-eye toggle-password" id="togglePassword"></i>
      </div>

      <button type="submit" id="loginBtn" class="btn-login"
        style="font-family: 'Kantumruy Pro'; font-weight: bold;">ចូលប្រព័ន្ធ (Login)</button>
    </form>

    <p class="footer-text">© 2026 Tian Xin School.</p>
  </div>

  <!-- Firebase SDKs (Version 9.6.1 Compat) -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>

  <!-- Custom Scripts -->
  <script src="/js/core/firebase-config.js"></script>
  <script src="/js/pages/login.js"></script>

  <script src="/js/core/offline-manager.js"></script>

</body>

</html>
