<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloudflare R2 Direct Upload Test</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Icons -->
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/uicons-regular-rounded/css/uicons-regular-rounded.css'>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@100..700&display=swap" rel="stylesheet">
    <!-- Animate.css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

    <style>
        :root {
            --primary: #8a0e5b;
            --primary-light: #c71585;
            --glass: rgba(255, 255, 255, 0.9);
        }

        body {
            font-family: 'Kantumruy Pro', sans-serif;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .upload-container {
            width: 100%;
            max-width: 600px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            padding: 3rem;
            box-shadow: 0 25px 50px -12px rgba(138, 14, 91, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header-section {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .header-section i {
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 1rem;
            display: block;
        }

        .header-section h2 {
            font-weight: 800;
            color: #333;
            margin-bottom: 0.5rem;
        }

        .drop-zone {
            border: 2px dashed rgba(138, 14, 91, 0.2);
            border-radius: 1.5rem;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(138, 14, 91, 0.02);
            position: relative;
        }

        .drop-zone:hover, .drop-zone.drag-over {
            border-color: var(--primary);
            background: rgba(138, 14, 91, 0.05);
            transform: scale(1.02);
        }

        .preview-container {
            margin-top: 2rem;
            display: none;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.4s ease;
        }

        .preview-img {
            width: 15rem;
            height: 15rem;
            object-fit: cover;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border: 4px solid white;
            margin-bottom: 1.5rem;
        }

        .btn-upload {
            background: var(--primary);
            color: white;
            border-radius: 1rem;
            padding: 0.8rem 2.5rem;
            font-weight: 700;
            border: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(138, 14, 91, 0.3);
        }

        .btn-upload:hover:not(:disabled) {
            background: var(--primary-light);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(138, 14, 91, 0.4);
        }

        .btn-upload:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .result-url {
            margin-top: 1.5rem;
            padding: 1rem;
            background: #fff;
            border-radius: 12px;
            border: 1px solid #eee;
            font-family: monospace;
            font-size: 0.85rem;
            word-break: break-all;
            display: none;
            width: 100%;
        }

        .copy-btn {
            background: none;
            border: none;
            color: var(--primary);
            font-weight: 700;
            margin-top: 0.5rem;
            cursor: pointer;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div class="upload-container">
    <div class="header-section">
        <i class="fi fi-rr-cloud-upload animate__animated animate__bounceIn"></i>
        <h2>R2 Direct API Upload</h2>
        <p class="text-muted">សាកល្បងបង្ហោះរូបភាពទៅ Cloudflare R2 API ផ្ទាល់</p>
    </div>

    <div class="mb-4">
        <label class="form-label fw-bold small text-muted text-uppercase mb-2">Folder Location</label>
        <select class="form-select" id="uploadFolder">
            <option value="tianxin">Student Folder (tianxin/)</option>
            <option value="Teacher">Teacher Folder (Teacher/)</option>
        </select>
    </div>

    <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <input type="file" id="fileInput" hidden accept="image/*">
        <div id="dropZoneText">
            <i class="fi fi-rr-picture fs-1 d-block mb-3 opacity-50"></i>
            <span class="fw-bold text-secondary">ចុចទីនេះ ឬទម្លាក់រូបភាពដើម្បីបង្ហោះ</span>
            <br>
            <small class="text-muted">JPG, PNG (ប្រភេទរូបភាពសិស្ស ឬឯកសារ)</small>
        </div>
    </div>

    <div class="preview-container" id="previewContainer">
        <img src="" id="imagePreview" class="preview-img">
        <button class="btn btn-upload" id="uploadBtn" onclick="handleUpload()">
            <i class="fi fi-rr-rocket me-2"></i> ចាប់ផ្តើមបង្ហោះរូបភាព
        </button>
        
        <div class="result-url" id="resultUrlContainer">
            <div class="text-secondary small mb-1 fw-bold">R2 Public URL:</div>
            <div id="urlText"></div>
            <button class="copy-btn" onclick="copyToClipboard()"><i class="fi fi-rr-copy me-1"></i> Copy URL</button>
        </div>
    </div>
</div>

<!-- Scripts -->
<script src="js/core/firebase-config.js"></script>
<script src="js/core/cloudflare-r2.js"></script>

<script>
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const previewContainer = document.getElementById('previewContainer');
    const imagePreview = document.getElementById('imagePreview');
    const uploadBtn = document.getElementById('uploadBtn');
    const dropZoneText = document.getElementById('dropZoneText');
    const resultUrlContainer = document.getElementById('resultUrlContainer');
    const urlText = document.getElementById('urlText');

    let selectedFile = null;

    // Handle File Selection
    fileInput.addEventListener('change', (e) => {
        if (e.target.files && e.target.files[0]) {
            displayPreview(e.target.files[0]);
        }
    });

    // Handle Drag and Drop
    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('drag-over');
    });

    dropZone.addEventListener('dragleave', () => {
        dropZone.classList.remove('drag-over');
    });

    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('drag-over');
        if (e.dataTransfer.files && e.dataTransfer.files[0]) {
            displayPreview(e.dataTransfer.files[0]);
        }
    });

    function displayPreview(file) {
        selectedFile = file;
        const reader = new FileReader();
        reader.onload = (e) => {
            imagePreview.src = e.target.result;
            previewContainer.style.display = 'flex';
            dropZone.style.display = 'none';
        };
        reader.readAsDataURL(file);
        
        // Reset results
        resultUrlContainer.style.display = 'none';
    }

    async function handleUpload() {
        if (!selectedFile) return;

        try {
            uploadBtn.disabled = true;
            uploadBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>កំពុងបង្ហោះតាម API...';

            // Use the centralized Cloudflare R2 upload function
            const folder = document.getElementById('uploadFolder').value;
            const url = await window.uploadImageToR2(selectedFile, "test_upload", folder);

            if (url && !url.startsWith('data:')) {
                urlText.innerText = url;
                imagePreview.src = url; // Update preview with REAL cloud URL
                resultUrlContainer.style.display = 'block';
                uploadBtn.innerHTML = '<i class="fi fi-rr-check-circle me-2"></i> បង្ហោះបានជោគជ័យ';
                uploadBtn.classList.remove('btn-upload');
                uploadBtn.classList.add('btn-success');
            } else {
                throw new Error("ការបង្ហោះបរាជ័យ ឬបានត្រឡប់ជា Base64 ជំនួសវិញ។");
            }

        } catch (error) {
            console.error("Upload Error:", error);
            alert("⚠️ " + error.message);
            uploadBtn.disabled = false;
            uploadBtn.innerHTML = '<i class="fi fi-rr-rocket me-2"></i> សាកល្បងឡើងវិញ';
        }
    }

    function copyToClipboard() {
        navigator.clipboard.writeText(urlText.innerText);
        alert("បានចម្លង URL រួចហើយ!");
    }
</script>

</body>
</html>
